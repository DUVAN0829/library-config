server:
  port: ${SERVER_PORT}

spring:

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  cloud:
    stream:
      bindings:
        loanEvents-in-0:
          destination: loan-events
          group: copy-service-group
      kafka:
        binder:
          brokers: ${KAFKA_BROKER}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

book-msvc:
  url: ${BOOK_MSVC_URL}
