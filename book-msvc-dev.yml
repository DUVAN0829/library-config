server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: book-msvc

  datasource:
    url: jdbc:postgresql://localhost:5432/book_msvc
    username: postgres
    password: 12345

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/library-management-api
