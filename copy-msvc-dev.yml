server:
  port: 8082

spring:

  datasource:
    url: jdbc:mysql://localhost:3306/copy_msvc
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

  cloud:
    stream:
      bindings:
        loanEvents-in-0:
          destination: loan-events
          group: copy-service-group
      kafka:
        binder:
          brokers: localhost:9092

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/library-management-api

book-msvc:
  url: http://localhost:8081
